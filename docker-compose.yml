version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: roadquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: roadquest_db
    ports:
      - "5432:5432"
    volumes:
      - roadquest_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d roadquest_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: roadquest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - roadquest_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  roadquest_postgres_data:
  roadquest_redis_data:
